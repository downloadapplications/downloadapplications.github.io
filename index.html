<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Store</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
    }

    /* PHONE CONTAINER */
    .phone{
      width:100%;
      max-width:420px;
      min-height:100vh;
      background:#f5f5f5;
    }

    /* TOP BAR */
    .topbar{
      position:sticky;
      top:0;
      background:white;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid #e6e6e6;
      z-index:10;
    }

    .logo{
      font-weight:700;
      color:#01875f;
      font-size:16px;
      white-space:nowrap;
    }

    .search{
      flex:1;
      background:#f1f3f4;
      border-radius:999px;
      padding:8px 10px;
      display:flex;
      align-items:center;
    }

    .search input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
      font-size:13px;
    }

    /* CATEGORY ROW */
    .categories{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding:10px;
      background:white;
      border-bottom:1px solid #eee;
    }

    .chip{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      background:#f1f3f4;
      white-space:nowrap;
      cursor:pointer;
    }

    .chip.active{
      background:#01875f;
      color:white;
    }

    /* LIST ROWS (ICON + TINY NAME ONLY) */
    .list{
      display:flex;
      flex-direction:column;
    }

    .row{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      background:white;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }

    .row:hover{
      background:#fafafa;
    }

    .icon{
      width:40px;
      height:40px;
      border-radius:10px;
      background:#eee;
      flex-shrink:0;
    }

    .name{
      font-size:12px;
      font-weight:500;
      color:#111;
      flex:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      padding:6px 10px;
      border:none;
      border-radius:999px;
      background:#01875f;
      color:white;
      font-size:11px;
      cursor:pointer;
    }

    .btn:hover{
      background:#016b4b;
    }
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search apps..." />
</header>

<div id="grid"></div>

<script>
let casks = [];

async function load() {
  const res = await fetch("https://formulae.brew.sh/api/cask.json");
  casks = await res.json();
  render(casks);
}

function getIcon(app) {
  // 1. Try GitHub avatar (best if homepage is GitHub)
  const gh = app.homepage?.match(/github\.com\/([^\/]+)\/([^\/]+)/);
  if (gh) {
    return `https://github.com/${gh[1]}.png?size=128`;
  }

  // 2. Try website favicon (best general fallback)
  if (app.homepage) {
    try {
      const domain = new URL(app.homepage).origin;
      return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    } catch (e) {}
  }

  // 3. Final fallback (no Dicebear anymore)
  return "https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg";
}

function getAppLink(app) {
  if (app.url) return app.url;
  if (app.homepage) return app.homepage;

  const gh = app.homepage?.match(/github\.com\/([^\/]+\/[^\/]+)/);
  if (gh) return `https://github.com/${gh[1]}`;

  return `https://formulae.brew.sh/cask/${app.token}`;
}

function openApp(token) {
  const app = casks.find(a => a.token === token);
  const url = getAppLink(app);
  window.open(url, "_blank");
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.slice(0, 200).forEach(app => {
    const name = app.name?.[0] || app.token;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="icon"
           src="${getIcon(app)}"
           onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'"

      <div class="name">${name}</div>
      <div class="desc">${app.desc || "No description"}</div>

      <button class="btn" onclick="event.stopPropagation(); openApp('${app.token}')">
        Download App
      </button>
    `;

    card.onclick = () => openApp(app.token);

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = casks.filter(app =>
    (app.name?.[0] || "").toLowerCase().includes(q) ||
    app.token.toLowerCase().includes(q) ||
    (app.desc || "").toLowerCase().includes(q)
  );

  render(filtered);
});

load();
</script>

</body>
</html>
