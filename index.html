<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Download Apps</title>
  </head>
  <body>
    <h1>Apps</h1>
    <input id="search" placeholder="Search apps..." />

    <ul id="list"></ul>

    <script>
      let casks = [];

      async function loadCasks() {
        const res = await fetch("https://formulae.brew.sh/api/cask.json");
        casks = await res.json();
        render(casks);
      }

      function render(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.slice(0, 200).forEach(app => {
          const li = document.createElement("li");

          const name = app.name?.[0] || app.token;

          li.innerHTML = `
            <strong>${name}</strong><br>
            ${app.desc || "No description"}<br>
            <small>${app.token}</small>
          `;

          list.appendChild(li);
        });
      }

      document.getElementById("search").addEventListener("input", e => {
        const q = e.target.value.toLowerCase();

        const filtered = casks.filter(app =>
          (app.name?.[0] || "").toLowerCase().includes(q) ||
          app.token.toLowerCase().includes(q) ||
          (app.desc || "").toLowerCase().includes(q)
        );

        render(filtered);
      });

      loadCasks();
    </script>
  </body>
</html>
