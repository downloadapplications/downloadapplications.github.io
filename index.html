<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download Applications</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER (needed for your CSS styling) -->
  <header>
    <h1>Download Applications</h1>

    <!-- optional search (your CSS already supports it) -->
    <input type="text" id="search" placeholder="Search apps...">
  </header>

  <!-- GRID CONTAINER -->
  <div id="apps" class="grid">Loading apps...</div>

  <!-- EMPTY STATE -->
  <div id="empty">No apps found</div>

  <script>
    const container = document.getElementById('apps');
    const emptyState = document.getElementById('empty');

    let allApps = [];

    function renderApps(apps) {
      container.innerHTML = "";

      if (!apps.length) {
        emptyState.classList.add("show");
        return;
      } else {
        emptyState.classList.remove("show");
      }

      apps.forEach(app => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h2>${app.name}</h2>
          <p>${app.dev} • ${app.category}</p>
          <p>${app.description}</p>
          <a class="btn" href="${app.link}" target="_blank">Official Download</a>
        `;

        container.appendChild(card);
      });
    }

    fetch('./apps.json')
      .then(res => {
        if (!res.ok) throw new Error("apps.json not found (check filename/path)");
        return res.json();
      })
      .then(apps => {
        allApps = apps;
        renderApps(allApps);
      })
      .catch(err => {
        container.innerHTML =
          "<p style='color:red'>Failed to load apps.json</p>";
        console.error(err);
      });

    // SEARCH FUNCTIONALITY (works with your CSS input styling)
    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = allApps.filter(app =>
        app.name.toLowerCase().includes(q) ||
        app.dev.toLowerCase().includes(q) ||
        app.category.toLowerCase().includes(q)
      );

      renderApps(filtered);
    });
  </script>

</body>
</html>
