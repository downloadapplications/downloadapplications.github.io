<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Store</title>

  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.store-wrap {
  font-family: var(--font-sans);
  background: var(--color-background-tertiary);
  min-height: 600px;
  border-radius: var(--border-radius-lg);
  overflow: hidden;
}

.store-header {
  padding: 20px 20px 0;
  background: var(--color-background-primary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.store-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.store-logo {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
}

.store-logo span {
  color: var(--color-text-info);
}

.search-wrap {
  flex: 1;
  position: relative;
}

.search-wrap i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: var(--color-text-tertiary);
}

#search {
  width: 100%;
  padding: 8px 12px 8px 32px;
  font-size: 14px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  outline: none;
}

#search:focus {
  border-color: var(--color-border-info);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
}

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}

.tab.active {
  color: var(--color-text-info);
  border-color: #3b82f6;
}

.tab:hover:not(.active) {
  color: var(--color-text-primary);
}

.featured {
  padding: 16px 16px 0;
}

.featured-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hero {
  background: linear-gradient(135deg, #1e3a5f, #0f6e56);
  border-radius: var(--border-radius-lg);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-bottom: 4px;
}

.hero:hover {
  opacity: 0.92;
}

.hero-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}

.hero-text .hero-name {
  font-size: 16px;
  font-weight: 500;
  color: #fff;
}

.hero-text .hero-sub {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.65);
  margin-top: 2px;
}

.hero-badge {
  margin-left: auto;
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 999px;
  white-space: nowrap;
  cursor: pointer;
  transition: background 0.15s;
}

.hero-badge:hover {
  background: rgba(255, 255, 255, 0.3);
}

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 16px 16px 8px;
}

.section-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
}

.see-all {
  font-size: 13px;
  color: var(--color-text-info);
  cursor: pointer;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--color-border-tertiary);
  border-top: 0.5px solid var(--color-border-tertiary);
}

.card {
  background: var(--color-background-primary);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.12s;
}

.card:hover {
  background: var(--color-background-secondary);
}

.icon {
  width: 52px;
  height: 52px;
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  border: 0.5px solid var(--color-border-tertiary);
}

.card-info {
  flex: 1;
  min-width: 0;
}

.name {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.desc {
  font-size: 11px;
  color: var(--color-text-secondary);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stars {
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-top: 3px;
}

.get-btn {
  padding: 5px 13px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-radius: 999px;
  background: var(--color-background-info);
  color: var(--color-text-info);
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s;
}

.get-btn:hover {
  opacity: 0.8;
}

.no-results {
  padding: 40px;
  text-align: center;
  color: var(--color-text-secondary);
  font-size: 14px;
  grid-column: 1 / -1;
}
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search apps and games..." />
</header>

<div id="grid"></div>

<script>
let casks = [];

  const featuredApps = [
  "google-chrome",
  "firefox",
  "brave-browser",
  "microsoft-edge",
  "discord",
  "slack",
  "zoom",
  "spotify",
  "vlc",
  "obs",
  "visual-studio-code",
  "figma",
  "notion",
  "telegram",
  "whatsapp",
  "steam",
  "epic-games",
  "gimp",
  "krita",
  "audacity",
  "raycast",
  "libreoffice",
  "onlyoffice",
  "microsoft-teams",
  "microsoft-word",
  "microsoft-powerpoint",
  "microsoft-excel",
  "onedrive",
  "thunderbird",
  "adobe-creative-cloud",
  "adobe-acrobat-reader",
  "adobe-dng-converter",
  "opera",
  "arc",
  "alfred",
  "evernote",
  "obsidian",
  "rectangle",
  "alt-tab",
  "inkscape",
  "blender",
  "affinity",
  "malwarebytes",
  "cleanmymac",
  "slack",
  "signal",
  "calibre",
  "appcleaner",
  "onyx",
  "latest",
  "freecad",
  "scribus",
  "kodi",
  "github",
  "android-studio",
  "visual-studio-code",
  "utm",
  "parallels",
  "virtualbox",
  "minecraft",
  "prismlauncher",
  "gog-galaxy",
  "modrinth",
  "league-of-legends",
  "protonvpn",
  "nordvpn",
  "bitwarden",
  "1password",
  "keepassxc",
  "lastpass",
  "nordpass",
  "tor-browser",
  "transmission"
  
  
  
];

async function load() {
  const res = await fetch("https://formulae.brew.sh/api/cask.json");
  casks = await res.json();

  casks = [
    ...casks.filter(app => featuredApps.includes(app.token)),
    ...casks.filter(app => !featuredApps.includes(app.token))
  ];

  render(casks);
}

function getIcon(app) {
  // 1. Try GitHub avatar (best if homepage is GitHub)
  const gh = app.homepage?.match(/github\.com\/([^\/]+)\/([^\/]+)/);
  if (gh) {
    return `https://github.com/${gh[1]}.png?size=128`;
  }

  // 2. Try website favicon (best general fallback)
  if (app.homepage) {
    try {
      const domain = new URL(app.homepage).origin;
      return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    } catch (e) {}
  }

  // 3. Final fallback (no Dicebear anymore)
  return "https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg";
}

function getAppLink(app) {
  if (app.url) return app.url;
  if (app.homepage) return app.homepage;

  const gh = app.homepage?.match(/github\.com\/([^\/]+\/[^\/]+)/);
  if (gh) return `https://github.com/${gh[1]}`;

  return `https://formulae.brew.sh/cask/${app.token}`;
}

function openApp(token) {
  const app = casks.find(a => a.token === token);
  const url = getAppLink(app);
  window.open(url, "_blank");
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.slice(0, 200).forEach(app => {
    const name = app.name?.[0] || app.token;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="icon"
           src="${getIcon(app)}"
           onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'"

      <div class="name">${name}</div>
      <div class="desc">${app.desc || "No description"}</div>

      <button class="btn" onclick="event.stopPropagation(); openApp('${app.token}')">
        Download App
      </button>
    `;

    card.onclick = () => openApp(app.token);

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = casks.filter(app =>
    (app.name?.[0] || "").toLowerCase().includes(q) ||
    app.token.toLowerCase().includes(q) ||
    (app.desc || "").toLowerCase().includes(q)
  );

  render(filtered);
});

load();
</script>

</body>
</html>
