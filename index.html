<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownloadApplications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #4a5568;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        /* macOS Button styling */
        .btn-mac {
            background-color: #000000;
            color: #ffffff;
        }
        .btn-mac:hover {
            background-color: #333333;
        }

        /* Windows Button styling */
        .btn-windows {
            background-color: #0078d4;
            color: #ffffff;
        }
        .btn-windows:hover {
            background-color: #005a9e;
        }

        /* Linux Button styling */
        .btn-linux {
            background-color: #fda814;
            color: #000000;
        }
        .btn-linux:hover {
            background-color: #e0920f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to DownloadApplications</h1>
        <p class="subtitle">What platform are you on?</p>
        
        <div class="btn-container">
            <a href="https://downloadapplications.github.io/macos-apps" class="btn btn-mac">macOS</a>
            
            <a href="https://downloadapplications.github.io/windows-apps" class="btn btn-windows">Windows</a>
            
            <a href="https://downloadapplications.github.io/linux-apps" class="btn btn-linux">Linux</a>
        </div>
    </div>

</body>
</html>
