<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DownloadApplications</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: #151f32;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      margin-bottom: 25px;
      color: #cbd5e1;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .mac {
      background: #2563eb;
    }

    .mac:hover {
      background: #1d4ed8;
    }

    .windows {
      background: #22c55e;
    }

    .windows:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to DownloadApplications</h1>
    <p>What platform are you on?</p>

    <a class="btn mac" href="https://downloadapplications.github.io/macos-apps">macOS</a>
    <a class="btn windows" href="https://downloadapplications.github.io/windows-apps">Windows</a>
  </div>
</body>
</html>
