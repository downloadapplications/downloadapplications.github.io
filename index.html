<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Store</title>

  <style>
  /* BASE */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f7;
  color:#1d1d1f;
}

/* HEADER (FIXES YOUR TINY SEARCH) */
header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(245,245,247,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #e5e5e5;
  display:flex;
  justify-content:center;
  padding:16px 20px;
}

#search{
  width:100%;
  max-width:900px;              /* BIG desktop search */
  padding:16px 20px;
  font-size:16px;
  border-radius:14px;
  border:1px solid #ddd;
  background:#fff;
  outline:none;
  transition:0.2s;
}

#search:focus{
  border-color:#007aff;
  box-shadow:0 0 0 4px rgba(0,122,255,0.1);
}

/* GRID CONTAINER (NO MORE PHONE FEEL) */
#grid{
  max-width:1400px;             /* wider = desktop feel */
  margin:30px auto;
  padding:0 20px;

  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:22px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  padding:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06),
             0 6px 18px rgba(0,0,0,0.04);
  display:flex;
  flex-direction:column;
  gap:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 28px rgba(0,0,0,0.08);
}

/* ICON */
.icon{
  width:72px;
  height:72px;
  border-radius:18px;
  object-fit:cover;
  background:#eee;
}

/* TEXT */
.name{
  font-size:15px;
  font-weight:600;
}

.desc{
  font-size:13px;
  color:#6e6e73;
  line-height:1.4;
  height:38px;
  overflow:hidden;
}

/* BUTTON */
.btn{
  margin-top:auto;
  padding:8px 14px;
  border:none;
  border-radius:999px;
  background:#007aff;
  color:white;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:0.15s;
}

.btn:hover{
  background:#0060d1;
}

/* RESPONSIVE (REAL FIX, NOT MOBILE MOCK) */
@media (max-width:900px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  }

  #search{
    font-size:14px;
    padding:14px 16px;
  }
}

@media (max-width:500px){
  #grid{
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }
}
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search apps and games..." />
</header>

<div id="grid"></div>

<script>
let casks = [];

  const featuredApps = [
  "google-chrome",
  "firefox",
  "brave-browser",
  "microsoft-edge",
  "discord",
  "slack",
  "zoom",
  "spotify",
  "vlc",
  "obs",
  "visual-studio-code",
  "figma",
  "notion",
  "telegram",
  "whatsapp",
  "steam",
  "epic-games"
];

async function load() {
  const res = await fetch("https://formulae.brew.sh/api/cask.json");
  casks = await res.json();

  casks = [
    ...casks.filter(app => featuredApps.includes(app.token)),
    ...casks.filter(app => !featuredApps.includes(app.token))
  ];

  render(casks);
}

function getIcon(app) {
  // 1. Try GitHub avatar (best if homepage is GitHub)
  const gh = app.homepage?.match(/github\.com\/([^\/]+)\/([^\/]+)/);
  if (gh) {
    return `https://github.com/${gh[1]}.png?size=128`;
  }

  // 2. Try website favicon (best general fallback)
  if (app.homepage) {
    try {
      const domain = new URL(app.homepage).origin;
      return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    } catch (e) {}
  }

  // 3. Final fallback (no Dicebear anymore)
  return "https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg";
}

function getAppLink(app) {
  if (app.url) return app.url;
  if (app.homepage) return app.homepage;

  const gh = app.homepage?.match(/github\.com\/([^\/]+\/[^\/]+)/);
  if (gh) return `https://github.com/${gh[1]}`;

  return `https://formulae.brew.sh/cask/${app.token}`;
}

function openApp(token) {
  const app = casks.find(a => a.token === token);
  const url = getAppLink(app);
  window.open(url, "_blank");
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.slice(0, 200).forEach(app => {
    const name = app.name?.[0] || app.token;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img> class="icon"
           src="${getIcon(app)}"
           onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'"

      <div class="name">${name}</div>
      <div class="desc">${app.desc || "No description"}</div>

      <button class="btn" onclick="event.stopPropagation(); openApp('${app.token}')">
        Download App
      </button>
    `;

    card.onclick = () => openApp(app.token);

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = casks.filter(app =>
    (app.name?.[0] || "").toLowerCase().includes(q) ||
    app.token.toLowerCase().includes(q) ||
    (app.desc || "").toLowerCase().includes(q)
  );

  render(filtered);
});

load();
</script>

</body>
</html>
