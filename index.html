<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Store</title>

  <style>
/* BASE - AERO 2009 */
body{
  margin:0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: radial-gradient(circle at top, #e6f2ff 0%, #b9d7ff 40%, #7fb2ff 100%);
  color:#1a1a1a;
}

/* HEADER (GLASS BAR) */
header{
  position:sticky;
  top:0;
  z-index:10;

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border-bottom: 1px solid rgba(255,255,255,0.4);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 8px 30px rgba(0,0,0,0.15);

  display:flex;
  justify-content:center;
  padding:18px 20px;
}

/* SEARCH (GLOSSY AERO FIELD) */
#search{
  width:100%;
  max-width:900px;

  padding:16px 20px;
  font-size:16px;

  border-radius:16px;

  border:1px solid rgba(255,255,255,0.6);

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.9),
    rgba(200,220,255,0.6)
  );

  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    0 6px 18px rgba(0,0,0,0.15);

  outline:none;
  transition:0.2s;
}

#search:focus{
  border-color:#4aa3ff;
  box-shadow:
    0 0 0 4px rgba(0,120,255,0.25),
    0 2px 0 rgba(255,255,255,0.9) inset,
    0 10px 25px rgba(0,80,255,0.25);
}

/* GRID */
#grid{
  max-width:1400px;
  margin:30px auto;
  padding:0 20px;

  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:22px;
}

/* CARD (AERO GLASS TILE) */
.card{
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border:1px solid rgba(255,255,255,0.5);

  border-radius:20px;

  padding:16px;

  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    0 10px 30px rgba(0,0,0,0.18);

  display:flex;
  flex-direction:column;
  gap:12px;

  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);

  box-shadow:
    0 2px 0 rgba(255,255,255,0.9) inset,
    0 18px 40px rgba(0,80,255,0.25);
}

/* ICON (GLOSS TILE) */
.icon{
  width:72px;
  height:72px;
  border-radius:16px;

  object-fit:cover;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.9),
    rgba(180,210,255,0.5)
  );

  box-shadow:
    0 2px 0 rgba(255,255,255,0.9) inset,
    0 8px 18px rgba(0,0,0,0.15);
}

/* TEXT */
.name{
  font-size:15px;
  font-weight:600;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
}

.desc{
  font-size:13px;
  color:#2f3b55;
  line-height:1.4;
  height:38px;
  overflow:hidden;
}

/* BUTTON (AERO BLUE GLOSS) */
.btn{
  margin-top:auto;

  padding:9px 14px;
  border:none;
  border-radius:999px;

  background: linear-gradient(
    to bottom,
    #5bb3ff,
    #1e7cff
  );

  color:white;
  font-size:13px;
  font-weight:600;

  box-shadow:
    0 2px 0 rgba(255,255,255,0.4) inset,
    0 8px 18px rgba(0,80,255,0.3);

  cursor:pointer;
  transition:0.15s;
}

.btn:hover{
  background: linear-gradient(
    to bottom,
    #74c2ff,
    #2b86ff
  );

  box-shadow:
    0 2px 0 rgba(255,255,255,0.5) inset,
    0 12px 25px rgba(0,100,255,0.35);
}

/* RESPONSIVE */
@media (max-width:900px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  }

  #search{
    font-size:14px;
    padding:14px 16px;
  }
}

@media (max-width:500px){
  #grid{
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }
}
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search apps and games..." />
</header>

<div id="grid"></div>

<script>
let casks = [];

  const featuredApps = [
  "google-chrome",
  "firefox",
  "brave-browser",
  "microsoft-edge",
  "discord",
  "slack",
  "zoom",
  "spotify",
  "vlc",
  "obs",
  "visual-studio-code",
  "figma",
  "notion",
  "telegram",
  "whatsapp",
  "steam",
  "epic-games",
  "gimp",
  "krita",
  "audacity",
  "raycast",
  "libreoffice",
  "onlyoffice",
  "microsoft-teams",
  "microsoft-word",
  "microsoft-powerpoint",
  "microsoft-excel",
  "onedrive",
  "thunderbird"
];

async function load() {
  const res = await fetch("https://formulae.brew.sh/api/cask.json");
  casks = await res.json();

  casks = [
    ...casks.filter(app => featuredApps.includes(app.token)),
    ...casks.filter(app => !featuredApps.includes(app.token))
  ];

  render(casks);
}

function getIcon(app) {
  // 1. Try GitHub avatar (best if homepage is GitHub)
  const gh = app.homepage?.match(/github\.com\/([^\/]+)\/([^\/]+)/);
  if (gh) {
    return `https://github.com/${gh[1]}.png?size=128`;
  }

  // 2. Try website favicon (best general fallback)
  if (app.homepage) {
    try {
      const domain = new URL(app.homepage).origin;
      return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    } catch (e) {}
  }

  // 3. Final fallback (no Dicebear anymore)
  return "https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg";
}

function getAppLink(app) {
  if (app.url) return app.url;
  if (app.homepage) return app.homepage;

  const gh = app.homepage?.match(/github\.com\/([^\/]+\/[^\/]+)/);
  if (gh) return `https://github.com/${gh[1]}`;

  return `https://formulae.brew.sh/cask/${app.token}`;
}

function openApp(token) {
  const app = casks.find(a => a.token === token);
  const url = getAppLink(app);
  window.open(url, "_blank");
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.slice(0, 200).forEach(app => {
    const name = app.name?.[0] || app.token;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="icon"
           src="${getIcon(app)}"
           onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'"

      <div class="name">${name}</div>
      <div class="desc">${app.desc || "No description"}</div>

      <button class="btn" onclick="event.stopPropagation(); openApp('${app.token}')">
        Download App
      </button>
    `;

    card.onclick = () => openApp(app.token);

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const filtered = casks.filter(app =>
    (app.name?.[0] || "").toLowerCase().includes(q) ||
    app.token.toLowerCase().includes(q) ||
    (app.desc || "").toLowerCase().includes(q)
  );

  render(filtered);
});

load();
</script>

</body>
</html>
