<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Store</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --text3: #aeaeb2;
      --blue: #0071e3;
      --blue-light: #e8f0fe;
      --sidebar-w: 210px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(245,245,247,0.9);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 11px 20px;
      display: flex;
      gap: 14px;
      align-items: center;
      height: 52px;
    }

    .logo {
      width: 200px;
      font-weight: 700;
      font-size: 18px;
    }
    .logo span { color: var(--blue); }

    #search {
      flex: 1;
      max-width: 520px;
      padding: 8px 14px 8px 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }

    .layout { display: flex; min-height: calc(100vh - 52px); }

    .sidebar {
      width: var(--sidebar-w);
      border-right: 1px solid var(--border);
      padding: 14px;
      background: #fff;
    }

    .nav {
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text2);
      font-size: 13px;
    }

    .nav:hover { background: #f2f2f2; }
    .nav.active { background: var(--blue); color: #fff; }

    .main { flex: 1; padding: 24px; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      display: flex;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #eee;
    }

    .name { font-weight: 600; font-size: 14px; }
    .desc { font-size: 12px; color: var(--text2); }
    .tag { font-size: 11px; color: var(--blue); }

    .btn {
      margin-left: auto;
      border: none;
      background: var(--blue-light);
      color: var(--blue);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">App<span>Store</span></div>
  <input id="search" placeholder="Search apps..." />
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="nav active" onclick="setCat('all',this)">All Apps</div>
    <div class="nav" onclick="setCat('brew',this)">macOS Apps</div>
    <div class="nav" onclick="setCat('winget',this)">Windows Apps</div>
  </aside>

  <main class="main">
    <div id="grid"></div>
  </main>

</div>

<script>
let brew = [];
let winget = [];
let all = [];
let cat = 'all';
let query = '';

async function loadBrew() {
  const res = await fetch('https://formulae.brew.sh/api/cask.json');
  brew = (await res.json()).map(a => ({
    id: a.token,
    name: a.name?.[0] || a.token,
    desc: a.desc || '',
    homepage: a.homepage || '',
    source: 'brew'
  }));
}

async function loadWinget() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/microsoft/winget-pkgs/master/index.json');
    const data = await res.json();

    winget = Object.entries(data).slice(0, 3000).map(([id, app]) => ({
      id,
      name: app.PackageName || id,
      desc: app.Description || '',
      homepage: app.PublisherUrl || '',
      source: 'winget'
    }));
  } catch (e) {
    winget = [];
  }
}

function platform(app) {
  return app.source === 'winget' ? '(windows)' : '(mac)';
}

function getList() {
  let list = all;

  if (cat === 'brew') list = brew;
  if (cat === 'winget') list = winget;

  if (query) {
    const q = query.toLowerCase();
    list = list.filter(a =>
      (a.name || '').toLowerCase().includes(q) ||
      (a.id || '').toLowerCase().includes(q) ||
      (a.desc || '').toLowerCase().includes(q)
    );
  }

  return list;
}

function render() {
  const grid = document.getElementById('grid');
  const list = getList();

  grid.innerHTML = '';

  list.slice(0, 120).forEach(app => {
    const div = document.createElement('div');
    div.className = 'card';

    div.onclick = () => window.open(app.homepage || '#', '_blank');

    div.innerHTML = `
      <div class="icon"></div>
      <div>
        <div class="name">${app.name} <span class="tag">${platform(app)}</span></div>
        <div class="desc">${app.desc}</div>
      </div>
      <button class="btn" onclick="event.stopPropagation(); window.open('${app.homepage || '#'}','_blank')">Open</button>
    `;

    grid.appendChild(div);
  });
}

function setCat(c, el) {
  cat = c;
  document.querySelectorAll('.nav').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

async function init() {
  await Promise.all([loadBrew(), loadWinget()]);
  all = [...brew, ...winget];
  render();
}

init();
</script>

</body>
</html>
